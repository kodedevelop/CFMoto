<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/home/CssSectionContato/defaultSectionContato.css">
  <title>Contato</title>
</head>

<body>
  <section class="contato">
    <div class="contato-informacoes">
      <h2>ENCONTRAR REVENDA</h2>
      <p>Busque a revenda mais próxima e agende sua visita para conhecer nossos modelos.</p>
      <img src="assets/icons/cfmotos-logo.png" alt="Logo-Cfmoto">
    </div>
    <div class="formulario-contato">
      <p>Preencha o formulário para encontrar a revenda mais próxima e conhecer o U10 PRO Highland de perto.</p>
      <form action="">
        <input type="text" name="nome" id="nome" maxlength="40" placeholder="Nome" required>
        <input type="text" name="telefone" id="telefone" placeholder="Telefone" required>
        <input type="email" name="email" id="email" placeholder="E-mail" required>
        <button>ENTRAR EM CONTATO</button>
      </form>
    </div>
  </section>
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery.mask/1.14.16/jquery.mask.min.js"></script>
  <script type="module" src="js/index.js"></script>
</body>

</html>
